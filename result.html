<!DOCTYPE html>
<html>
<head>
    <title>Detection Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h2 class="text-center">Detection Result</h2>

            <div class="text-center mt-3">
                <img src="{{ url_for('static', filename='uploads/' + image_name) }}" width="400" class="img-fluid">
            </div>

            <h4 class="mt-4 text-center">Detected Plate Number:</h4>
            <h3 class="text-success text-center">{{ plate_text }}</h3>
            <p class="text-center text-muted mb-0">
                AI confidence: {{ "%.0f"|format(confidence * 100) }}%
            </p>

            <a href="/" class="btn btn-primary w-100 mt-3">Go Back</a>
        </div>
    </div>
</body>
</html>
